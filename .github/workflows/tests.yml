name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # allow manual runs from the GitHub Actions tab

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MPLBACKEND: Agg       # headless matplotlib (no display on the runner)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric==2.7.0 optuna==4.4.0 mlflow==3.13.0 \
                      h5py==3.14.0 ase==3.25.0 numpy==1.26.0 scipy==1.16.0 \
                      matplotlib==3.9.2 plotly==6.2.0 pytest==9.0.3

      - name: Run test suite
        working-directory: tests
        run: |
          python -m pytest test_train_model.py test_predictions.py test_optimize_hyperparameters.py -v
